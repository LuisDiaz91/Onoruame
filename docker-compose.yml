version: '3.9'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: rutas_db
      POSTGRES_USER: rutas_user
      POSTGRES_PASSWORD: rutas_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    env_file:
      - .env

volumes:
  postgres_data:
